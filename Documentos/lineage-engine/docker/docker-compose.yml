services:
  neo4j:
    image: neo4j:5.18-community
    container_name: lineage-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Driver Bolt (conexión desde Python)
    environment:
      NEO4J_AUTH: neo4j/lineage_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "lineage_password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
